<!doctype html>
<html lang="zh-Hans">
	<head>
		<title>Inner Frame</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	</head>
	<body>
		<p id="sampleText"></p>
		<script>
			var edaObj = (typeof eda !== 'undefined') ? eda : (window.parent && window.parent.eda);
			function t(tag) {
				if (edaObj && edaObj.sys_I18n) return edaObj.sys_I18n.text(tag);
				return tag;
			}
			document.getElementById('sampleText').textContent = t('This is a sample IFrame page');
		</script>
	</body>
</html>
